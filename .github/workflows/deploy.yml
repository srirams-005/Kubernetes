name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - run: |
        docker build -t ${{ secrets.DOCKER_USER }}/backend ./backend
        docker build -t ${{ secrets.DOCKER_USER }}/frontend ./frontend
        docker push ${{ secrets.DOCKER_USER }}/backend
        docker push ${{ secrets.DOCKER_USER }}/frontend

    - run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig
        export KUBECONFIG=kubeconfig
        kubectl apply -f k8s/