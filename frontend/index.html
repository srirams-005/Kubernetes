<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Tier Application</title> 
</head>
<body>
  <h2>3 Tier App</h2>
  <button onclick="call()">Call Backend</button>
  <p id="res"></p>

  <script>
    async function call() {
      const res = await fetch('/');
      const text = await res.text();
      document.getElementById("res").innerText = text;
    }
  </script>
</body>
</html>
